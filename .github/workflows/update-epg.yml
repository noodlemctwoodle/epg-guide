name: Update EPG mirror

on:
  schedule:
    - cron: '17 */12 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and decompress Rytec UK guides
        run: |
          set -euo pipefail
          curl -sL --max-time 60 -o skylive.xml.xz http://www.xmltvepg.nl/rytecUK_SkyLive.xz
          curl -sL --max-time 60 -o sportmovies.xml.xz http://www.xmltvepg.nl/rytecUK_SportMovies.xz
          xz -dkf skylive.xml.xz
          xz -dkf sportmovies.xml.xz
          rm -f skylive.xml.xz sportmovies.xml.xz

      - name: Commit updated guides
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skylive.xml sportmovies.xml
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update EPG mirror $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
